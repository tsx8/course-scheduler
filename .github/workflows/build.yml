name: Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'wails.json'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'wails.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: solver/.python-version

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\uv\cache
            solver\.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('solver/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: pip install uv

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          $gopath = go env GOPATH
          "$gopath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Sync solver dependencies
        run: uv --directory solver sync --frozen

      - name: Build solver sidecar
        run: npm run build:solver

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Build Go backend
        run: go build ./...

      - name: Build Wails app
        run: wails build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: course-scheduler-windows
          path: build/bin/*.exe
          if-no-files-found: error
