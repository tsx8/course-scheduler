name: Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - '.golangci.yml'
      - '.prettierrc.json'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'wails.json'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - '.golangci.yml'
      - '.prettierrc.json'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'wails.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --prefer-offline --no-audit --no-fund

      - name: Lint frontend
        run: npm --prefix frontend run lint

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Prepare embedded asset placeholders
        run: |
          mkdir -p frontend/dist solver/dist
          touch frontend/dist/index.html solver/dist/solver.exe

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  lint-solver:
    name: Lint solver
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: solver/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            solver/.python-version
            solver/pyproject.toml
            solver/uv.lock

      - name: Sync solver dependencies
        run: uv --directory solver sync --frozen --all-groups

      - name: Lint solver
        run: uv --directory solver run ruff check .

      - name: Check solver formatting
        run: uv --directory solver run ruff format --check .

  lint:
    name: Lint
    needs:
      - lint-frontend
      - lint-go
      - lint-solver
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}

    steps:
      - name: Check lint jobs
        run: |
          if [ "${{ needs.lint-frontend.result }}" != "success" ] || [ "${{ needs.lint-go.result }}" != "success" ] || [ "${{ needs.lint-solver.result }}" != "success" ]; then
            echo "One or more lint jobs failed."
            exit 1
          fi

          echo "All lint jobs passed."

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: solver/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            solver/.python-version
            solver/pyproject.toml
            solver/uv.lock

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          $gopath = go env GOPATH
          "$gopath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            $nsisPath = "${env:ProgramFiles}\NSIS"
          }
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            throw "makensis.exe not found after NSIS installation"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisPath\makensis.exe" /VERSION

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --prefer-offline --no-audit --no-fund

      - name: Sync solver dependencies
        run: uv --directory solver sync --frozen

      - name: Build Wails installer
        run: wails build -nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: course-scheduler-windows-installer
          path: build/bin/*-installer.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS Apple Silicon app
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: solver/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            solver/.python-version
            solver/pyproject.toml
            solver/uv.lock

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --prefer-offline --no-audit --no-fund

      - name: Sync solver dependencies
        run: uv --directory solver sync --frozen

      - name: Build Wails app
        run: wails build -platform darwin/arm64

      - name: Archive app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/bin/course-scheduler.app build/bin/course-scheduler-darwin-arm64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: course-scheduler-darwin-arm64
          path: build/bin/course-scheduler-darwin-arm64.zip
          if-no-files-found: error
          retention-days: 14
