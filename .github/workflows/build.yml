name: Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'wails.json'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'build/**'
      - 'frontend/**'
      - 'internal/**'
      - 'solver/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'wails.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: solver/.python-version

      - name: Cache uv environment
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\uv\cache
            solver\.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('solver/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: pip install uv

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          $gopath = go env GOPATH
          "$gopath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            $nsisPath = "${env:ProgramFiles}\NSIS"
          }
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            throw "makensis.exe not found after NSIS installation"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisPath\makensis.exe" /VERSION

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Sync solver dependencies
        run: uv --directory solver sync --frozen

      - name: Build solver sidecar
        run: uv --directory solver run pyinstaller solver.spec

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Build Go backend
        run: go build ./...

      - name: Build Wails installer
        run: wails build -nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: course-scheduler-windows-installer
          path: build/bin/*-installer.exe
          if-no-files-found: error
